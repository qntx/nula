[package]
name = "nula-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Nostr protocol core: events, filters, keys, messages, NIP primitives."
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["std"]

# Enable `std` (default). Required by the crate today; reserved for future
# `no_std` work that splits crypto/IO out of the core.
std = []

[dependencies]
faster-hex.workspace = true
getrandom.workspace = true
secp256k1 = { workspace = true, features = ["global-context", "rand"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
url.workspace = true

[dev-dependencies]
hex-literal.workspace = true
serde_json = { workspace = true, features = ["std"] }

[lints]
workspace = true
