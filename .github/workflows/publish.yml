name: Publish to crates.io

on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish:
    uses: qntx/workflows/.github/workflows/publish-crates.yml@main
    with:
      packages: "nula-core nula-storage nula-keyring nula-blossom nula-sync nula-relay nula-gossip nula-signer nula-nwc nula-sdk nula-cli"
    secrets:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
